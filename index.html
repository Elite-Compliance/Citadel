
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="referrer" content="strict-origin-when-cross-origin" />
  <title>Citadel App Shell</title>
  <link rel="stylesheet" href="./styles.css?v=2.1.2.30" />
  <style>
    .citadel-login-overlay{position:fixed;inset:0;z-index:10000;display:grid;place-items:center;padding:24px;background:linear-gradient(145deg,#07182b,#102d4a)}
    .citadel-login-card{width:min(440px,100%);padding:34px;border:1px solid #b9c9d9;background:#fff;color:#10243a;box-shadow:0 24px 70px rgba(0,0,0,.34);text-align:center}
    .citadel-login-mark{display:grid;place-items:center;width:58px;height:58px;margin:0 auto 18px;border:1px solid #8eabc5;background:#123a62;color:#fff;font-size:30px;font-weight:800}
    .citadel-login-card p{margin:0 0 4px;color:#1c6aa3;font-size:12px;font-weight:800;letter-spacing:.12em;text-transform:uppercase}
    .citadel-login-card h1{margin:0 0 10px;font-size:30px}.citadel-login-card>span{display:block;color:#526579;line-height:1.5}
    .citadel-login-message{min-height:22px;margin:16px 0 8px;color:#922b35;font-weight:700}.citadel-login-card [data-google-signin]{display:flex;justify-content:center;min-height:44px}
    .citadel-login-card small{display:block;margin-top:18px;color:#66788b}.citadel-auth-required .app-shell{visibility:hidden}
    .citadel-account-settings{display:grid;gap:4px;margin-top:14px;padding-top:14px;border-top:1px solid rgba(130,150,170,.35)}
    .citadel-account-settings span,.citadel-account-settings small{color:inherit;opacity:.78}.citadel-account-settings button{margin-top:8px;padding:9px 12px;border:1px solid currentColor;background:transparent;color:inherit;font-weight:700;cursor:pointer}
    .citadel-users-modal{width:min(1000px,94vw);max-height:88vh;overflow:auto}.citadel-users-layout{display:grid;grid-template-columns:290px minmax(0,1fr);gap:18px;padding:18px}
    .citadel-user-list{display:grid;align-content:start;gap:7px}.citadel-user-list button{display:grid;gap:3px;padding:12px;border:1px solid #bdcbd8;background:#fff;color:#132b44;text-align:left;cursor:pointer}.citadel-user-list span,.citadel-user-list small{color:#5c6f82}
    .citadel-user-form{display:grid;gap:14px}.citadel-user-form>label,.citadel-user-form-row>label{display:grid;gap:5px;font-weight:700}.citadel-user-form input,.citadel-user-form select{min-height:42px;padding:8px 10px;border:1px solid #aebfce;background:#fff;color:#11263c}
    .citadel-user-form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}.citadel-user-form fieldset{margin:0;padding:12px;border:1px solid #bdcbd8}.citadel-user-form legend{padding:0 6px;font-weight:800}
    .citadel-access-checks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}.citadel-access-checks label{display:flex;align-items:center;gap:7px;font-weight:600}.citadel-access-checks input{min-height:0}.citadel-user-form-status{min-height:20px;color:#922b35;font-weight:700}
    @media(max-width:760px){.citadel-users-layout{grid-template-columns:1fr}.citadel-user-form-row,.citadel-access-checks{grid-template-columns:1fr 1fr}}
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" aria-label="Primary navigation">
      <div class="brand-block">
        <div class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 48 48" role="img"><path d="M24 4 40 11v13c0 10.6-6.8 16.9-16 20-9.2-3.1-16-9.4-16-20V11L24 4Z"/><path d="M17 29V18l7-4 7 4v11h-4v-8h-6v8h-4Z"/></svg>
        </div>
        <div><div class="brand-name">Citadel</div><div class="version">v2.1.2</div></div>
      </div>
      <nav class="nav-list" id="primaryNav"></nav>
    </aside>
    <main class="workspace">
      <header class="topbar">
        <div><p class="eyebrow">Operations Platform</p><h1 id="pageTitle">Command Center</h1></div>
        <div class="topbar-actions"><button class="refresh-button" id="forceRefreshButton" type="button">Refresh</button><div class="settings-wrap"><button class="settings-button" id="settingsButton" type="button" aria-label="Settings" aria-expanded="false"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a7.8 7.8 0 0 0 .1-1l2-1.6-2-3.5-2.4 1a7.4 7.4 0 0 0-1.7-1l-.4-2.6h-4l-.4 2.6c-.6.2-2.1.0-1.7 1l-2.4-1-2 3.5 2 1.6a7.8 7.8 0 0 0 0 2l-2 1.6 2 3.5 2.4-1c.5.4 1.1.8 1.7 1l.4 2.6h4l.4-2.6c.6-.2 1.2-.6 1.7-1l2.4 1 2-3.5-2-1.6Z"/></svg></button><div class="settings-menu" id="settingsMenu" hidden><div class="settings-title">Settings</div><div class="settings-row"><span>Theme</span><div class="theme-toggle" role="group" aria-label="Theme"><button type="button" data-theme-choice="dark">Dark</button><button type="button" data-theme-choice="light">Light</button></div></div></div></div></div>
      </header>
      <section class="page-panel" aria-live="polite">
        <div class="panel-header"><div><p class="section-label" id="sectionLabel">Live overview</p><h2 id="panelTitle">Command Center</h2></div><div class="status-pill"><span></span>Stable</div></div>
        <div id="subTabs" class="sub-tabs" hidden></div>
        <div class="metric-grid" id="metricGrid"></div>
        <div class="content-grid">
          <article class="work-card"><div class="card-heading"><h3 id="focusTitle">Operational Focus</h3><span id="focusBadge">Today</span></div><p id="focusCopy"></p></article>
          <article class="work-card compact"><div class="card-heading"><h3>Queue Snapshot</h3><span>Priority</span></div><ul id="queueList" class="queue-list"></ul></article>
        </div>
      </section>
    </main>
  </div>
  <script src="./data/pricing-data.js?v=2.1.2"></script>
  <script src="./app.js?v=2.1.2.45"></script>
</body>
</html>
