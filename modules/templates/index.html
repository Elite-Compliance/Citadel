<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Citadel Templates</title>
  <script>
    try {
      document.documentElement.dataset.theme = window.parent !== window
        ? window.parent.document.body.dataset.theme
        : (localStorage.getItem("citadel-theme") || "light");
    } catch (error) {
      document.documentElement.dataset.theme = "light";
    }
  </script>
  <link rel="stylesheet" href="./styles.css?v=1.1.2">
</head>
<body>
  <main id="app" class="templates-shell"></main>
  <script src="./data.js?v=1.1.2"></script>
  <script src="./app.js?v=1.1.2"></script>
</body>
</html>
